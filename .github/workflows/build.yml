name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 🔍 Debug file structure
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== GITHUB_WORKSPACE ==="
          echo "${{ github.workspace }}"
          echo "=== Files ==="
          find . -maxdepth 5 -not -path './.git/*' -not -path './.build/*' | head -50
          echo "=== Package.swift ==="
          cat Package.swift

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          swift build -c release 2>&1
          echo "=== Build output ==="
          ls -la .build/release/
          find .build -name "ClipboardHistory" -type f 2>/dev/null

      - name: Create .app
        run: |
          set -x
          ROOT="${{ github.workspace }}"
          BINARY=$(find "$ROOT/.build" -name "ClipboardHistory" -type f 2>/dev/null | head -1)
          echo "Binary found: $BINARY"
          
          mkdir -p "$ROOT/build/ClipboardHistory.app/Contents/MacOS"
          mkdir -p "$ROOT/build/ClipboardHistory.app/Contents/Resources"
          
          cp "$BINARY" "$ROOT/build/ClipboardHistory.app/Contents/MacOS/"
          
          # Find Info.plist
          PLIST=$(find "$ROOT" -name "Info.plist" -maxdepth 4 2>/dev/null | head -1)
          echo "Info.plist: $PLIST"
          cp "$PLIST" "$ROOT/build/ClipboardHistory.app/Contents/"
          
          # Find Assets
          ASSETS=$(find "$ROOT" -name "Assets.xcassets" -maxdepth 4 -type d 2>/dev/null | head -1)
          echo "Assets: $ASSETS"
          if [ -n "$ASSETS" ]; then
            cp -r "$ASSETS" "$ROOT/build/ClipboardHistory.app/Contents/Resources/"
          fi
          
          echo "=== App bundle ==="
          find "$ROOT/build" -maxdepth 4

      - name: Package
        run: |
          cd ${{ github.workspace }}/build
          zip -r ../ClipboardHistory.zip ClipboardHistory.app
          cd ${{ github.workspace }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/ClipboardHistory.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
