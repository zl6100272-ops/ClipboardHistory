name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build (release)
        run: |
          swift build -c release 2>&1
          BIN_PATH=$(swift build -c release --show-bin-path 2>&1)
          echo "BIN_PATH=$BIN_PATH" >> $GITHUB_ENV
          echo "=== Binary dir ==="
          ls -la "$BIN_PATH/"
          echo "=== Binary check ==="
          find "$BIN_PATH" -name "ClipboardHistory" -type f

      - name: Create .app bundle
        run: |
          set -x
          BINARY="${{ env.BIN_PATH }}/ClipboardHistory"
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found at $BINARY, trying find..."
            BINARY=$(find "${{ github.workspace }}/.build" -name "ClipboardHistory" -type f 2>/dev/null | head -1)
          fi
          echo "Using binary: $BINARY"
          test -f "$BINARY" || { echo "FATAL: binary not found"; exit 1; }

          ROOT="${{ github.workspace }}"
          APP="$ROOT/build/ClipboardHistory.app"
          mkdir -p "$APP/Contents/MacOS"

          cp "$BINARY" "$APP/Contents/MacOS/ClipboardHistory"

          # Try to find existing Info.plist in source
          PLIST=$(find "$ROOT" -name "Info.plist" -not -path '*/\.*' -maxdepth 4 2>/dev/null | head -1)
          if [ -n "$PLIST" ]; then
            echo "Found Info.plist at: $PLIST"
            cp "$PLIST" "$APP/Contents/Info.plist"
          else
            echo "No Info.plist found, generating with PlistBuddy..."
            /usr/libexec/PlistBuddy -c "Add CFBundleDisplayName string 'Clipboard History'" "$APP/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleIdentifier string com.clipboard-history" "$APP/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundleName string ClipboardHistory" "$APP/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Add CFBundlePackageType string APPL" "$APP/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Add LSMinimumSystemVersion string 13.5" "$APP/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Add LSUIElement bool true" "$APP/Contents/Info.plist"
          fi

          echo "=== App bundle ==="
          find "$APP" -maxdepth 3
          echo "=== Codesign ==="
          codesign --force --deep --sign - "$APP" || echo "codesign skipped (no cert)"

      - name: Package (zip)
        run: |
          cd ${{ github.workspace }}/build
          zip -r ../ClipboardHistory.zip ClipboardHistory.app
          cd ${{ github.workspace }}
          ls -lh ClipboardHistory.zip

      - name: Create DMG (optional)
        run: |
          if command -v create-dmg &>/dev/null; then
            create-dmg \
              --volname "Clipboard History" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "ClipboardHistory.app" 175 120 \
              --hide-extension "ClipboardHistory.app" \
              --app-drop-link 425 120 \
              "${{ github.workspace }}/ClipboardHistory.dmg" \
              "${{ github.workspace }}/build/"
            ls -lh "${{ github.workspace }}/ClipboardHistory.dmg"
          else
            echo "create-dmg not installed, will upload .zip only"
          fi

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/ClipboardHistory.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
