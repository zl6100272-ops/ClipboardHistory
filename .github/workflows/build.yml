name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: /Users/runner/work/ClipboardHistory/ClipboardHistory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build (SPM)
        run: swift build -c release

      - name: Locate binary
        id: binary
        run: |
          BIN=$(swift build -c release --show-bin-path)/ClipboardHistory
          echo "binary=$BIN" >> $GITHUB_OUTPUT
          ls -la "$BIN"

      - name: Create .app bundle
        run: |
          BINARY="${{ steps.binary.outputs.binary }}"
          BUNDLE="build/ClipboardHistory.app"
          mkdir -p "$BUNDLE/Contents/MacOS"
          mkdir -p "$BUNDLE/Contents/Resources"
          cp "$BINARY" "$BUNDLE/Contents/MacOS/"
          cp ClipboardHistory/Info.plist "$BUNDLE/Contents/"
          # Copy Assets.xcassets
          cp -r ClipboardHistory/Assets.xcassets "$BUNDLE/Contents/Resources/" 2>/dev/null || true
          # Generate a simple app icon if no assets
          echo "App bundle created at $BUNDLE"

      - name: Create DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "ClipboardHistory v${{ github.ref_name }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ClipboardHistory.app" 175 190 \
            --hide-extension "ClipboardHistory.app" \
            --app-drop-link 425 190 \
            "ClipboardHistory.dmg" \
            "build/" || {
              echo "create-dmg failed, falling back to zip..."
              cd build && zip -r ../ClipboardHistory.zip ClipboardHistory.app
            }

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClipboardHistory.dmg
            ClipboardHistory.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
